<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper — Bodhi Protocol</title>
  <meta property="og:title" content="Minesweeper — Bodhi Protocol" />
  <meta property="og:description" content="Classic Minesweeper with Kids & Adult modes. Think. Flag. Survive." />
  <meta property="og:image" content="assets/preview.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --border: #d0d7de;
      --text-primary: #1f2328;
      --text-secondary: #656d76;
      --accent: #1a6e43;
      --accent2: #0550ae;
      --cell-hidden: #c8cdd4;
      --cell-hidden-hover: #b0b7bf;
      --cell-revealed: #dde1e6;
      --cell-kids: #e8f4fd;
      --radius: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --cell-hidden: #3d444d;
        --cell-hidden-hover: #484f58;
        --cell-revealed: #21262d;
        --cell-kids: #1a2d3d;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 0.85rem;
    }

    /* ── Banner ─────────────────────────────── */
    #banner { width: 100%; max-width: 720px; border-radius: 12px; overflow: hidden; }
    #banner svg { display: block; width: 100%; height: auto; }

    /* ── Mode toggle ─────────────────────────── */
    #mode-toggle {
      display: flex;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    #mode-toggle button {
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 6px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    #mode-toggle button.active {
      background: var(--text-primary);
      color: var(--bg);
    }

    /* ── HUD ─────────────────────────────────── */
    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      width: 100%;
      max-width: 520px;
      font-family: monospace;
      font-size: 18px;
      font-weight: 700;
    }
    #hud .hud-val { color: #e55; min-width: 44px; }
    #hud .hud-timer { color: #1a7; min-width: 44px; text-align: right; }
    #smiley {
      font-size: 26px;
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      transition: transform 0.1s;
    }
    #smiley:hover { transform: scale(1.15); }

    /* ── Grid ────────────────────────────────── */
    #grid-wrap {
      overflow: auto;
      max-width: 100%;
    }
    #grid {
      display: inline-grid;
      gap: 2px;
      background: var(--border);
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 2px;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-size: calc(var(--cell) * 0.44);
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      transition: background 0.08s;
      line-height: 1;
    }
    .cell.hidden {
      background: var(--cell-hidden);
    }
    .cell.hidden:hover { background: var(--cell-hidden-hover); }
    .cell.flagged {
      background: var(--cell-hidden);
      font-size: calc(var(--cell) * 0.5);
    }
    .cell.revealed {
      background: var(--cell-revealed);
      cursor: default;
    }
    .cell.exploded {
      background: #c0392b;
    }
    .cell.mine-shown {
      background: var(--cell-revealed);
    }
    .cell.wrongflag {
      background: #c0392b;
    }

    /* Classic Minesweeper number colors */
    .n1 { color: #1a73e8; }
    .n2 { color: #2e7d32; }
    .n3 { color: #d32f2f; }
    .n4 { color: #1565c0; }
    .n5 { color: #b71c1c; }
    .n6 { color: #00838f; }
    .n7 { color: #212121; }
    .n8 { color: #616161; }

    /* Kids number colors */
    .kn1 { color: #e91e63; }
    .kn2 { color: #00897b; }
    .kn3 { color: #f57c00; }
    .kn4 { color: #7b1fa2; }
    .kn5 { color: #c62828; }
    .kn6 { color: #0277bd; }
    .kn7 { color: #2e7d32; }
    .kn8 { color: #4e342e; }

    /* ── Best time ───────────────────────────── */
    #best-time {
      font-size: 13px;
      color: var(--text-secondary);
      min-height: 1.2em;
      text-align: center;
    }
    #best-time span { color: #f5a623; font-weight: 700; }

    /* ── Message ─────────────────────────────── */
    #msg {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      min-height: 1.5em;
      text-align: center;
    }

    /* ── How to play hint ───────────────────── */
    #hint {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      text-align: center;
      max-width: 520px;
      width: 100%;
      transition: opacity 0.4s;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }
    #hint b { color: var(--text-primary); }

    /* ── Footer ──────────────────────────────── */
    footer {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 0.5rem;
    }
    footer a { color: inherit; }
  </style>
</head>

<!-- ── Mode Toggle ──────────────────────────────────────────────────────── -->
<div id="mode-toggle">
  <button id="btn-kids"  class="active" onclick="setMode('kids')">🧒 Kids</button>
  <button id="btn-adult"           onclick="setMode('adult')">🧠 Adult</button>
</div>

<!-- ── HUD ─────────────────────────────────────────────────────────────── -->
<div id="hud">
  <span>💣 <span class="hud-val" id="mines-left">008</span></span>
  <button id="smiley" onclick="initGame()">😊</button>
  <span>⏱ <span class="hud-timer" id="timer">000</span></span>
</div>

<!-- ── Grid ────────────────────────────────────────────────────────────── -->
<div id="grid-wrap">
  <div id="grid"></div>
</div>

<!-- ── Message ─────────────────────────────────────────────────────────── -->
<div id="hint">
  👆 <b>Left click</b> to reveal &nbsp;·&nbsp; 🚩 <b>Right click</b> to flag &nbsp;·&nbsp; 💣 Clear all safe cells to win
</div>
<div id="best-time"></div>
<div id="msg"></div>

<footer>
  Right-click or long-press to flag &nbsp;·&nbsp;
  <a href="https://github.com/BodhiProtocol" target="_blank">BodhiProtocol</a>
</footer>

<script>
const MODES = {
  kids:  { rows: 8,  cols: 8,  mines: 8,  cell: 44, numClass: 'kn' },
  adult: { rows: 16, cols: 16, mines: 40, cell: 28, numClass: 'n'  }
};

let mode = 'kids';
let grid = [];
let state = 'idle'; // idle | playing | won | lost
let flagCount = 0;
let timerVal = 0;
let timerTick = null;
let firstClick = true;

/* ── Init ── */
function setMode(m) {
  mode = m;
  document.getElementById('btn-kids').classList.toggle('active', m === 'kids');
  document.getElementById('btn-adult').classList.toggle('active', m === 'adult');
  initGame();
}

function initGame() {
  clearInterval(timerTick);
  timerVal = 0;
  flagCount = 0;
  firstClick = true;
  state = 'idle';

  const { rows, cols } = MODES[mode];
  grid = Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () =>
      ({ mine: false, revealed: false, flagged: false, adj: 0, exploded: false })
    )
  );

  document.getElementById('smiley').textContent = '😊';
  document.getElementById('msg').textContent = '';
  document.getElementById('hint').classList.remove('hidden');
  updateHUD();
  updateBestTime();
  renderGrid();
}

/* ── Mine placement (after first click) ── */
function placeMines(safeR, safeC) {
  const { rows, cols, mines } = MODES[mode];
  const safe = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = safeR + dr, nc = safeC + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
        safe.add(nr * cols + nc);
    }

  const pool = [];
  for (let i = 0; i < rows * cols; i++) if (!safe.has(i)) pool.push(i);
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  for (let i = 0; i < mines; i++) {
    grid[Math.floor(pool[i] / cols)][pool[i] % cols].mine = true;
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!grid[r][c].mine) grid[r][c].adj = countAdj(r, c);
}

function countAdj(r, c) {
  const { rows, cols } = MODES[mode];
  let n = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc].mine) n++;
    }
  return n;
}

/* ── Flood reveal ── */
function reveal(r, c) {
  const { rows, cols } = MODES[mode];
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  const cell = grid[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  if (!cell.mine && cell.adj === 0)
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr || dc) reveal(r + dr, c + dc);
}

/* ── Handlers ── */
function handleClick(r, c) {
  if (state === 'won' || state === 'lost') return;
  const cell = grid[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstClick) {
    firstClick = false;
    state = 'playing';
    document.getElementById('hint').classList.add('hidden');
    placeMines(r, c);
    timerTick = setInterval(() => {
      timerVal = Math.min(timerVal + 1, 999);
      document.getElementById('timer').textContent = String(timerVal).padStart(3, '0');
    }, 1000);
  }

  if (cell.mine) {
    cell.revealed = true;
    cell.exploded = true;
    state = 'lost';
    clearInterval(timerTick);
    revealAllMines();
    document.getElementById('smiley').textContent = '😵';
    document.getElementById('msg').textContent =
      mode === 'kids' ? '😢 Oops! Try again — you\'ve got this!' : '💥 Game Over. Better luck next time.';
    renderGrid();
    return;
  }

  reveal(r, c);

  if (checkWin()) {
    state = 'won';
    clearInterval(timerTick);
    document.getElementById('smiley').textContent = '😎';
    const key = 'best_' + mode;
    const prev = parseInt(localStorage.getItem(key)) || Infinity;
    const isNew = timerVal < prev;
    if (isNew) localStorage.setItem(key, timerVal);
    document.getElementById('msg').textContent =
      mode === 'kids'
        ? '🎉 Amazing! You Won!'
        : `✅ Board cleared! Time: ${timerVal}s${isNew ? ' 🏆 New Best!' : ''}`;
    updateBestTime();
    autoFlagRemaining();
  }

  updateHUD();
  renderGrid();
}

function handleFlag(r, c, e) {
  if (e) e.preventDefault();
  if (state === 'won' || state === 'lost' || state === 'idle') return;
  const cell = grid[r][c];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  flagCount += cell.flagged ? 1 : -1;
  updateHUD();
  renderGrid();
}

function revealAllMines() {
  const { rows, cols } = MODES[mode];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      if (cell.mine && !cell.flagged) cell.revealed = true;
      if (cell.flagged && !cell.mine) cell.wrongFlag = true;
    }
}

function autoFlagRemaining() {
  const { rows, cols } = MODES[mode];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      if (cell.mine && !cell.flagged) { cell.flagged = true; flagCount++; }
    }
  updateHUD();
}

function checkWin() {
  const { rows, cols } = MODES[mode];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      if (!cell.mine && !cell.revealed) return false;
    }
  return true;
}

/* ── Render ── */
function renderGrid() {
  const { rows, cols, cell: sz, numClass } = MODES[mode];
  const g = document.getElementById('grid');
  g.style.gridTemplateColumns = `repeat(${cols}, ${sz}px)`;
  g.style.setProperty('--cell', sz + 'px');

  g.innerHTML = '';
  const frag = document.createDocumentFragment();

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = grid[r][c];
      const div = document.createElement('div');
      div.className = 'cell';

      if (cell.wrongFlag) {
        div.classList.add('wrongflag');
        div.textContent = '❌';
      } else if (cell.revealed) {
        div.classList.add('revealed');
        if (cell.mine) {
          div.classList.add(cell.exploded ? 'exploded' : 'mine-shown');
          div.textContent = '💣';
        } else if (cell.adj > 0) {
          div.textContent = cell.adj;
          div.classList.add(numClass + cell.adj);
        }
      } else if (cell.flagged) {
        div.classList.add('flagged');
        div.textContent = '🚩';
      } else {
        div.classList.add('hidden');
      }

      /* click */
      div.addEventListener('click', () => handleClick(r, c));
      div.addEventListener('contextmenu', (e) => handleFlag(r, c, e));

      /* long-press flag for touch */
      let pressTimer;
      div.addEventListener('touchstart', () => { pressTimer = setTimeout(() => handleFlag(r, c, null), 420); }, { passive: true });
      div.addEventListener('touchend',  () => clearTimeout(pressTimer));
      div.addEventListener('touchmove', () => clearTimeout(pressTimer));

      frag.appendChild(div);
    }
  }
  g.appendChild(frag);
}

function updateBestTime() {
  const best = localStorage.getItem('best_' + mode);
  const el = document.getElementById('best-time');
  el.innerHTML = best ? `🏆 Best: <span>${best}s</span>` : '';
}

function updateHUD() {
  const { mines } = MODES[mode];
  document.getElementById('mines-left').textContent =
    String(Math.max(0, mines - flagCount)).padStart(3, '0');
  document.getElementById('timer').textContent = String(timerVal).padStart(3, '0');
}

/* ── Start ── */
initGame();
</script>
