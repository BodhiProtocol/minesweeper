<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <radialGradient id="sphere" cx="33%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#9a9a9a"/>
      <stop offset="35%"  stop-color="#444"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff3300" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="mglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#3a7bd5" stroke-width="0.6" opacity="0.07">
    <line x1="0" y1="70"  x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="70"  y1="0" x2="70"  y2="630"/>
    <line x1="140" y1="0" x2="140" y2="630"/>
    <line x1="210" y1="0" x2="210" y2="630"/>
    <line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="350" y1="0" x2="350" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="490" y1="0" x2="490" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="630" y1="0" x2="630" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="770" y1="0" x2="770" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="910" y1="0" x2="910" y2="630"/>
    <line x1="980" y1="0" x2="980" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- Decorative mini board top-left -->
  <g opacity="0.55">
    <rect x="30" y="30"  width="55" height="55" rx="4" fill="#1e3a2f"/>
    <text x="57" y="64" text-anchor="middle" font-size="28" fill="#2e7d32" font-weight="900" font-family="system-ui">2</text>
    <rect x="88" y="30"  width="55" height="55" rx="4" fill="#1e2d3a"/>
    <text x="115" y="64" text-anchor="middle" font-size="28" fill="#1a73e8" font-weight="900" font-family="system-ui">1</text>
    <rect x="30" y="88"  width="55" height="55" rx="4" fill="#21262d"/>
    <rect x="88" y="88"  width="55" height="55" rx="4" fill="#1e3a2f"/>
    <text x="115" y="122" text-anchor="middle" font-size="28" fill="#2e7d32" font-weight="900" font-family="system-ui">3</text>
    <rect x="146" y="30" width="55" height="55" rx="4" fill="#2d1818"/>
    <text x="173" y="64" text-anchor="middle" font-size="28" fill="#d32f2f" font-weight="900" font-family="system-ui">💣</text>
    <rect x="146" y="88" width="55" height="55" rx="4" fill="#1e2d3a"/>
    <text x="173" y="122" text-anchor="middle" font-size="28" fill="#1a73e8" font-weight="900" font-family="system-ui">1</text>
  </g>

  <!-- Mine center: 340, 315 -->
  <!-- Glow -->
  <circle cx="340" cy="315" r="200" fill="url(#glow)"/>

  <!-- Spikes -->
  <g stroke="#5a5a5a" stroke-width="18" stroke-linecap="round" filter="url(#shadow)">
    <line x1="460" y1="315" x2="530" y2="315"/>
    <line x1="422" y1="413" x2="472" y2="463"/>
    <line x1="340" y1="450" x2="340" y2="520"/>
    <line x1="258" y1="413" x2="208" y2="463"/>
    <line x1="220" y1="315" x2="150" y2="315"/>
    <line x1="258" y1="217" x2="208" y2="167"/>
    <line x1="340" y1="180" x2="340" y2="110"/>
    <line x1="422" y1="217" x2="472" y2="167"/>
  </g>
  <!-- Spike tips -->
  <g fill="#6a6a6a">
    <circle cx="533" cy="315" r="14"/>
    <circle cx="474" cy="465" r="14"/>
    <circle cx="340" cy="523" r="14"/>
    <circle cx="206" cy="465" r="14"/>
    <circle cx="147" cy="315" r="14"/>
    <circle cx="206" cy="165" r="14"/>
    <circle cx="340" cy="107" r="14"/>
    <circle cx="474" cy="165" r="14"/>
  </g>

  <!-- Sphere -->
  <circle cx="340" cy="315" r="120" fill="url(#sphere)" filter="url(#shadow)"/>

  <!-- Sheen -->
  <ellipse cx="298" cy="272" rx="44" ry="30" fill="white" opacity="0.18" transform="rotate(-35 298 272)"/>
  <circle  cx="290" cy="260" r="18" fill="white" opacity="0.32"/>
  <circle  cx="282" cy="252" r="8"  fill="white" opacity="0.60"/>

  <!-- Fuse -->
  <path d="M340,180 C365,140 420,108 455,88" stroke="#7a5010" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M340,180 C365,140 420,108 455,88" stroke="#c08030" stroke-width="4" stroke-linecap="round" fill="none" stroke-dasharray="10,10"/>
  <!-- Spark -->
  <circle cx="455" cy="88" r="24" fill="url(#spark)" filter="url(#mglow)"/>
  <circle cx="455" cy="88" r="10" fill="#fff9c4"/>
  <circle cx="455" cy="88" r="5"  fill="#ffffff"/>

  <!-- Title -->
  <text x="610" y="290"
        font-family="system-ui,-apple-system,Arial Black,sans-serif"
        font-size="148" font-weight="900"
        fill="white" letter-spacing="-4"
        filter="url(#tglow)">MINE</text>
  <text x="610" y="430"
        font-family="system-ui,-apple-system,Arial Black,sans-serif"
        font-size="148" font-weight="900"
        fill="white" letter-spacing="-4"
        filter="url(#tglow)">SWEEPER</text>

  <!-- Tagline -->
  <text x="614" y="490"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="38" fill="#6a8fa8" letter-spacing="8" font-weight="500">THINK · FLAG · SURVIVE</text>

  <!-- Separator -->
  <line x1="610" y1="520" x2="1170" y2="520" stroke="#2a3a4a" stroke-width="2"/>

  <!-- Mode badges -->
  <rect x="610" y="540" width="140" height="52" rx="8" fill="#1a4a2e"/>
  <text x="680" y="572" text-anchor="middle" font-family="system-ui" font-size="26" fill="#4caf80" font-weight="600">🧒 Kids</text>

  <rect x="762" y="540" width="150" height="52" rx="8" fill="#0d2a4a"/>
  <text x="837" y="572" text-anchor="middle" font-family="system-ui" font-size="26" fill="#5a9fd4" font-weight="600">🧠 Adult</text>

  <!-- GitHub mark + BodhiProtocol -->
  <g transform="translate(982,540) scale(2.2)" fill="#8b949e">
    <path d="M12 0C5.37 0 0 5.373 0 12c0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12c0-6.627-5.373-12-12-12z"/>
  </g>
  <text x="1042" y="578" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#8b949e" font-weight="500">BodhiProtocol</text>
</svg>
